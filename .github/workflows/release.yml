name: Release

# Triggered by pushing a version tag, e.g.: git tag v0.1.0-beta.1 && git push --tags
#
# Re-verifies the full test suite on every platform, builds a Linux AppImage
# (self-contained: bundled CPython/PyQt5/rv32i_core/RISC-V toolchain, verified
# to run standalone with no host dependencies), and opens a draft GitHub
# Release with the AppImage attached. Windows/macOS packaging (PyInstaller
# bundles) is a later phase of the project roadmap and will add build/upload
# steps to the `build` job below for those legs.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # manual trigger, e.g. for testing the packaging steps without cutting a real tag

permissions:
  contents: write

jobs:
  build:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Qt runtime dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libopengl0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 libdbus-1-3

      - name: Run setup + full test suite (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./scripts/setup.sh --no-venv

      - name: Run setup + full test suite (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/setup.ps1 -NoVenv

      # TODO(packaging phase): PyInstaller bundle for Windows/macOS.

      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        # --no-venv above means python-appimage (from requirements-dev.txt)
        # is already on this job's plain `python3`, same as the test suite.
        run: ./scripts/build_appimage.sh

      - name: Upload AppImage artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: dist/rv32i-emulator-*.AppImage
          if-no-files-found: error

  create-draft-release:
    name: Create draft GitHub Release
    needs: build
    if: github.event_name == 'push' # skip on manual workflow_dispatch test runs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: appimage
          path: dist

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          files: dist/rv32i-emulator-*.AppImage
          # TODO(packaging phase): add Windows/macOS PyInstaller artifacts here too.
