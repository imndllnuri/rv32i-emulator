name: Release

# Triggered by pushing a version tag, e.g.: git tag v0.1.0-beta.1 && git push --tags
#
# For now this just re-verifies the full test suite on every platform and
# opens a draft GitHub Release with auto-generated notes -- no packages
# attached yet. Packaging (Snap/AppImage/Windows/macOS bundles, each with the
# RISC-V toolchain vendored in) lands in a later phase of the project roadmap
# and will add build/upload steps to the `build` job below per OS.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Qt runtime dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libopengl0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 libdbus-1-3

      - name: Run setup + full test suite (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./scripts/setup.sh --no-venv

      - name: Run setup + full test suite (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/setup.ps1 -NoVenv

      # TODO(packaging phase): build the platform-specific package here
      # (Snap/AppImage on Linux, PyInstaller bundle on Windows/macOS) and
      # upload it as a workflow artifact for the release job below to attach.

  create-draft-release:
    name: Create draft GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          # TODO(packaging phase): add `files:` here once per-OS packages are
          # produced by the `build` job's upload-artifact/download-artifact steps.
