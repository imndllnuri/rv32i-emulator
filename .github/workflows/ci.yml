name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # PyQt5 needs a handful of shared libraries to even load its "offscreen"
      # platform plugin on a headless Linux runner -- without these the GUI
      # tests fail at import time with a Qt platform-plugin error, not a
      # useful Python traceback.
      - name: Install Qt runtime dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libopengl0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 libdbus-1-3

      - name: Run setup + full test suite (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./scripts/setup.sh --no-venv

      - name: Run setup + full test suite (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/setup.ps1 -NoVenv

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}
          path: |
            core/build/Testing/**
            .pytest_cache/**
          if-no-files-found: ignore
